# OpenMontage - Global Configuration

llm:
  provider: groq
  model: llama-3.1-70b-versatile   
  system_prompt_path: "prompts/egyptian_kids.txt"        # null = use provider default
  temperature: 0.7
  max_tokens: 4096

budget:
  mode: warn                     # observe | warn | cap
  total_usd: 10.00
  reserve_pct: 0.10              # holdback for retries / cleanup
  single_action_approval_usd: 0.50
  require_approval_for_new_paid_tool: true

checkpoint:
  policy: guided                 # guided | manual_all | auto_noncreative
  storage_dir: pipeline          # relative to project root

output:
  default_format: mp4
  default_codec: libx264
  default_audio_codec: aac
  default_resolution: "1920x1080"
  default_fps: 30
  default_crf: 23

paths:
  pipeline_dir: pipeline
  library_dir: library
  styles_dir: styles
  skills_dir: skills
  output_dir: output
tts:
  provider: elevenlabs
  voice_id: "21m00Tcm4TlvDq8ikWAM" # This is "Rachel", which sounds very clear in Arabic, but I'll show you how to find a more "Egyptian" one in the next step.
  model_id: "eleven_multilingual_v2" # CRITICAL: This model supports Egyptian Arabic