name: Deploy to baseet.tech

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: baseet
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /home/baseet/Baseet...Grad-Project
            bash deploy.sh
